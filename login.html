<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube TudoGostoso - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- Header / Logo -->
    <header>
        <div class="logo-container">
            <span class="logo-clube">Clube</span>
            <span class="logo-tudo">Tudo</span>
            <span class="chef-hat"><i class="fa-solid fa-utensils"></i></span>
            <span class="logo-gostoso">Gostoso</span>
        </div>
    </header>

    <!-- Main Container Background -->
    <main class="main-container">
        
        <!-- Login Card -->
        <div class="login-card">
            <h2>Entrar</h2>

            <!-- Social Logins -->
            <button class="btn-social btn-facebook">
                <i class="fa-brands fa-facebook-f"></i> Entrar com o Facebook
            </button>
            <button class="btn-social btn-google">
                <i class="fa-brands fa-google"></i> Entrar com o Google
            </button>

            <div class="divider">ou</div>

            <!-- Credentials Form -->
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-control" placeholder="alex@cuisine.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" required>
                        <i class="fa-regular fa-eye toggle-password"></i>
                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueceu sua senha?</a>

                <div class="remember-me">
                    <input type="checkbox" id="keep-logged">
                    <label for="keep-logged">Permanecer conectado.</label>
                </div>

                <button type="submit" class="btn-submit">
                    Entrar <i class="fa-solid fa-chevron-right" style="font-size: 11px;"></i>
                </button>
            </form>

            <p class="register-text">Não possui uma conta? <a href="#">Cadastre-se.</a></p>
        </div>

    </main>

    <!-- Cookie Consent Footer -->
    <footer class="cookie-bar">
        <p>Caso você continue navegando no TudoGostoso, você aceita o uso de cookies. Este site usa cookies para assegurar a performance de nossos serviços. <a href="#">Leia nossa política de privacidade.</a></p>
        <button class="btn-cookie-ok">OK</button>
    </footer>

<script src="js/auth.js"></script>
<script src="js/login.js"></script>

</body>
</html>
