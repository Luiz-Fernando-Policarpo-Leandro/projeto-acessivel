<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Receitas do Chef</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="fontawesome/css/all.min.css">
  <link rel="stylesheet" href="css/receitas.css">
</head>
<body>

  <header class="site-header">
    <nav class="topbar" aria-label="Navegacao principal">
      <a class="brand" href="index.html" aria-label="Receitas do Chef">
        <span class="brand-mark"><i class="fas fa-utensils" aria-hidden="true"></i></span>
        <span>Receitas do Chef</span>
      </a>
      <a class="login-link" href="perfil.html">Perfil</a>
    </nav>
  </header>

  <main class="profile-main">
    <div class="profile-card">
      <div class="profile-avatar" id="profile-avatar"></div>
      <h1 id="profile-name"></h1>
      <p class="profile-email" id="profile-email"></p>
      <p class="profile-bio" id="profile-bio"></p>
      <button class="profile-logout-btn" id="logout-btn" type="button">
        <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Sair
      </button>
    </div>

    <section class="profile-section">
      <p class="section-kicker">Suas receitas</p>
      <h2>Receitas favoritas</h2>
      <div class="status-message" id="fav-status" role="status" aria-live="polite"></div>
      <div class="recipes-grid" id="fav-grid" aria-label="Receitas favoritas"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Receitas do Chef — uma selecao minimalista para cozinhar melhor.</p>
  </footer>

<script src="js/auth.js"></script>
<script src="js/perfil.js"></script>
</body>
</html>
